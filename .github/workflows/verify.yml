name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Installs Lean and Lake safely without messy curl pipes
    - name: Install Lean Toolchain
      uses: elan-actions/setup-elan@v1

    # Generates a valid lake-manifest.json in the background
    - name: Configure Manifest and Verify Proof
      run: |
        lake update
        lake build
