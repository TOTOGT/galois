name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Generates the missing dependency manifest block dynamically
    - name: Generate Lake Manifest
      run: |
        curl -sSfL https://lean-lang.org | sh -s -- -y --default-toolchain none
        source $HOME/.elan/env
        lake update

    - name: Setup Lean 4 and Build Project
      uses: leanprover/lean-action@v1
