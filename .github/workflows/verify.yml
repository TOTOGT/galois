name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Lean 4 and Build Project
      uses: leanprover/lean-action@v1
      with:
        auto-config: true
        build: true
        # Add retry configuration if the action supports it
      env:
        # Ensure git has proper configuration
        GIT_TERMINAL_PROMPT: 0
        
