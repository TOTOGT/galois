name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # The action natively generates the manifest file itself when flag is true
    - name: Setup Lean 4 and Build Project
      uses: leanprover/lean-action@v1
      with:
        lake-update: true
