name: Verify Lean 4 Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Lean 4 and Build
        uses: leanprover/lean-action@v1
        with:
          auto-config: true
          build: true
          use-mathlib-cache: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-logs
          path: .lake/build/
          retention-days: 7
