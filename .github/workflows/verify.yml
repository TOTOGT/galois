name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Uses standard communities workflow layer to fetch toolchains and execute dependency lookups
    - name: Setup Elan Environment
      uses: leanprover/lean-action@v1
      with:
        auto-config: 'false'
        build: 'false'

    # Run the manifest update operation manually inside the populated environment
    - name: Regenerate Dependency Index
      run: |
        lake update
        lake build
