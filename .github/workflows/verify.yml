    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
        submodules: recursive

    - name: Show git & network info (debug)
      run: |
        git --version
        git config --list
        # Try cloning one dependency to capture the underlying git error if it fails
        GIT_TRACE=1 GIT_CURL_VERBOSE=1 git clone https://github.com/leanprover-community/mathlib4.git /tmp/mathlib4-clone || true
        ls -la /tmp || true

    - name: Update Lake Dependencies (with retries)
      run: |
        set -e
        attempts=0
        max_attempts=3
        until [ $attempts -ge $max_attempts ]
        do
          attempts=$((attempts+1))
          echo "Attempt $attempts of $max_attempts: running lake update..."
          # Enable verbose git tracing for better logs if it fails
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 lake update && break || {
            echo "lake update failed (attempt $attempts)"
            if [ $attempts -lt $max_attempts ]; then
              sleep $((attempts * 5))
              continue
            else
              echo "All attempts failed; exiting with non-zero status"
              exit 1
            fi
          }
        done
