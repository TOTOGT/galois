name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Elan (Lean Version Manager)
      run: |
        curl -sSfL https://lean-lang.org | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Build and Verify Proof Kernel
      run: |
        # Explicitly source the elan environment profiles for this block execution
        source $HOME/.elan/env
        lake env lean --version
        lake build
