name: Lean 4 Kernel Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Lean dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan
          .lake
        key: lean-${{ runner.os }}-${{ hashFiles('**/lakefile.lean') }}
        restore-keys: lean-${{ runner.os }}-

    - name: Setup Lean 4 and Build Project
      uses: leanprover/lean-action@v1
      with:
        auto-config: true
        build: true
        lean-version: 'stable'

    - name: Report success
      if: success()
      run: echo "✅ Lean 4 kernel check passed"
